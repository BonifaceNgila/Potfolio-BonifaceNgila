{% extends "admin/base_admin.html" %}
{% block title %}{{ "Edit" if skill else "Add" }} Skill{% endblock %}

{% block content %}
<div class="form-container">
    <h1><i class="fas fa-tools"></i> {{ "Edit" if skill else "Add" }} Skill</h1>
    <form method="POST">
        <div class="form-group">
            <label for="category">Category</label>
            <input type="text" id="category" name="category" value="{{ skill.category if skill else '' }}" required placeholder="e.g. Front-end">
        </div>
        <div class="form-group">
            <label for="items">Items (comma-separated)</label>
            <textarea id="items" name="items" rows="3" required placeholder="e.g. JavaScript, React.js, HTML5, CSS3">{{ skill.items if skill else '' }}</textarea>
        </div>
        <div class="form-group">
            <label for="sort_order">Sort Order</label>
            <input type="number" id="sort_order" name="sort_order" value="{{ skill.sort_order if skill else 0 }}">
        </div>
        <div class="form-actions">
            <button type="submit" class="btn btn-primary">Save</button>
            <a href="{{ url_for('admin_dashboard') }}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
