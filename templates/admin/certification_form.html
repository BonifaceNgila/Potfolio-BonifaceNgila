{% extends "admin/base_admin.html" %}
{% block title %}{{ "Edit" if certification else "Add" }} Certification{% endblock %}

{% block content %}
<div class="form-container">
    <h1><i class="fas fa-certificate"></i> {{ "Edit" if certification else "Add" }} Certification</h1>
    <form method="POST">
        <div class="form-group">
            <label for="title">Certification Title</label>
            <input type="text" id="title" name="title" value="{{ certification.title if certification else '' }}" required>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label for="issuer">Issuer</label>
                <input type="text" id="issuer" name="issuer" value="{{ certification.issuer if certification else '' }}" placeholder="e.g. Oracle, Google">
            </div>
            <div class="form-group">
                <label for="date_obtained">Date Obtained</label>
                <input type="text" id="date_obtained" name="date_obtained" value="{{ certification.date_obtained if certification else '' }}" placeholder="e.g. October 2025">
            </div>
        </div>
        <div class="form-group">
            <label for="sort_order">Sort Order</label>
            <input type="number" id="sort_order" name="sort_order" value="{{ certification.sort_order if certification else 0 }}">
        </div>
        <div class="form-actions">
            <button type="submit" class="btn btn-primary">Save</button>
            <a href="{{ url_for('admin_dashboard') }}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
