{% extends "admin/base_admin.html" %}
{% block title %}{{ "Edit" if project else "Add" }} Project{% endblock %}

{% block content %}
<div class="form-container">
    <h1><i class="fas fa-code"></i> {{ "Edit" if project else "Add" }} Project</h1>
    <form method="POST">
        <div class="form-group">
            <label for="title">Project Title</label>
            <input type="text" id="title" name="title" value="{{ project.title if project else '' }}" required>
        </div>
        <div class="form-group">
            <label for="description">Description</label>
            <textarea id="description" name="description" rows="4">{{ project.description if project else '' }}</textarea>
        </div>
        <div class="form-group">
            <label for="technologies">Technologies (comma-separated)</label>
            <input type="text" id="technologies" name="technologies" value="{{ project.technologies if project else '' }}" placeholder="e.g. PHP, MySQL, JavaScript">
        </div>
        <div class="form-row">
            <div class="form-group">
                <label for="url">Project URL</label>
                <input type="url" id="url" name="url" value="{{ project.url if project else '' }}">
            </div>
            <div class="form-group">
                <label for="sort_order">Sort Order</label>
                <input type="number" id="sort_order" name="sort_order" value="{{ project.sort_order if project else 0 }}">
            </div>
        </div>
        <div class="form-actions">
            <button type="submit" class="btn btn-primary">Save</button>
            <a href="{{ url_for('admin_dashboard') }}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
