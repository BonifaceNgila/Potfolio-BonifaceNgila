{% extends "admin/base_admin.html" %}
{% block title %}Edit Profile{% endblock %}

{% block content %}
<div class="form-container">
    <h1><i class="fas fa-user"></i> Edit Profile</h1>
    <form method="POST" enctype="multipart/form-data">
        <!-- Profile Picture -->
        <div class="form-group">
            <label>Profile Picture</label>
            <div style="display: flex; align-items: center; gap: 1.5rem; margin-bottom: 0.5rem;">
                {% if profile.profile_picture %}
                <img src="{{ url_for('static', filename=profile.profile_picture) }}" alt="Profile" style="width: 80px; height: 80px; border-radius: 50%; object-fit: cover; border: 3px solid #3182ce;">
                {% else %}
                <div style="width: 80px; height: 80px; border-radius: 50%; background: #e2e8f0; display: flex; align-items: center; justify-content: center; font-size: 2rem; color: #a0aec0;"><i class="fas fa-user"></i></div>
                {% endif %}
                <div>
                    <input type="file" id="profile_picture" name="profile_picture" accept="image/*">
                    <small style="display: block; color: #718096; margin-top: 0.3rem;">Max 5 MB. JPG, PNG, GIF, WebP.</small>
                </div>
            </div>
        </div>
        <div class="form-group">
            <label for="full_name">Full Name</label>
            <input type="text" id="full_name" name="full_name" value="{{ profile.full_name }}" required>
        </div>
        <div class="form-group">
            <label for="tagline">Tagline</label>
            <input type="text" id="tagline" name="tagline" value="{{ profile.tagline or '' }}" placeholder="e.g. ICT Support Specialist | Web Developer">
        </div>
        <div class="form-group">
            <label for="bio">Bio / Profile Summary</label>
            <textarea id="bio" name="bio" rows="6">{{ profile.bio or '' }}</textarea>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" value="{{ profile.email or '' }}">
            </div>
            <div class="form-group">
                <label for="phone">Phone</label>
                <input type="text" id="phone" name="phone" value="{{ profile.phone or '' }}">
            </div>
        </div>
        <div class="form-group">
            <label for="address">Address</label>
            <input type="text" id="address" name="address" value="{{ profile.address or '' }}">
        </div>
        <div class="form-row">
            <div class="form-group">
                <label for="linkedin">LinkedIn URL</label>
                <input type="url" id="linkedin" name="linkedin" value="{{ profile.linkedin or '' }}">
            </div>
            <div class="form-group">
                <label for="github">GitHub URL</label>
                <input type="url" id="github" name="github" value="{{ profile.github or '' }}">
            </div>
        </div>
        <div class="form-actions">
            <button type="submit" class="btn btn-primary">Save Profile</button>
            <a href="{{ url_for('admin_dashboard') }}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
